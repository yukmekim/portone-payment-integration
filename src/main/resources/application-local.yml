spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

portone:
  api-secret: test-api-secret
  webhook-secret: test-webhook-secret
  channel-group-id: channel-group-test
  pending-expiry-minutes: 30
  expiry-scheduler-interval-ms: 300000
